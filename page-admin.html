<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Page 客戶後台</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box}body{margin:0;background:#eef3f8;color:#17233c;font-family:"Microsoft JhengHei",sans-serif}header{background:#102a43;color:#fff;padding:17px 22px;display:flex;justify-content:space-between}main{max-width:1200px;margin:auto;padding:22px}.card{background:#fff;border:1px solid #dce5ee;border-radius:11px;padding:18px;margin-bottom:16px}.login{max-width:430px;margin:50px auto}.hidden{display:none!important}input,select,textarea{width:100%;padding:9px;border:1px solid #d5e0ea;border-radius:7px;font:inherit}button{border:0;border-radius:7px;padding:9px 13px;background:#1677c8;color:#fff;font-weight:800;cursor:pointer}.secondary{background:#fff;color:#4e6074;border:1px solid #d5e0ea}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.toolbar input{max-width:300px}.lead{border-bottom:1px solid #e6edf3;padding:14px 0;display:grid;grid-template-columns:1fr auto;gap:12px}.lead:last-child{border:0}.meta{display:flex;gap:14px;flex-wrap:wrap;color:#65768a;font-size:13px}.actions{display:flex;gap:6px;flex-wrap:wrap}.notice{font-size:13px;color:#68798b}@media(max-width:700px){main{padding:10px}.lead{grid-template-columns:1fr}}
</style></head><body><header><strong id="title">Page 客戶後台</strong><button id="logout" class="secondary hidden" onclick="logout()">登出</button></header><main>
<section id="login" class="card login"><h2>Page 后台登录</h2><p id="page-label" class="notice"></p><label>密码</label><input id="password" type="password"><div style="height:12px"></div><button onclick="login()">登录</button><p id="msg" class="notice"></p></section>
<section id="app" class="hidden"><div class="card toolbar"><select id="page-filter" onchange="loadLeads()"></select><input id="search" placeholder="搜尋姓名 / 手機 / LINE" oninput="render()"><button onclick="loadLeads()">刷新</button><button class="secondary" onclick="exportCsv()">汇出 CSV</button></div><section class="card"><div id="leads"></div><p id="empty" class="notice">目前没有客户资料。</p></section></section></main>
<script>
const URL_='https://ijzywhrnhvldkjdwfdyy.supabase.co',KEY='sb_publishable_6aY1-VEvimuV1K4FzURO2Q_inVt-ZKL';const db=supabase.createClient(URL_,KEY);let rows=[],pagePassword='';const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const requestedPage=new URLSearchParams(location.search).get('page')||'main';$('page-label').textContent=`登录 Page：${requestedPage}`;
async function login(){pagePassword=$('password').value;const {data,error}=await db.rpc('page_login',{target_slug:requestedPage,page_password:pagePassword});$('msg').textContent=error||!data?'密码错误':'登录成功';if(data)start()}
async function start(){$('login').classList.add('hidden');$('app').classList.remove('hidden');$('logout').classList.remove('hidden');$('page-filter').innerHTML=`<option value="${esc(requestedPage)}">${esc(requestedPage)}</option>`;loadLeads()}
function logout(){pagePassword='';location.reload()}
async function loadLeads(){const {data,error}=await db.rpc('get_page_leads',{target_slug:requestedPage,page_password:pagePassword});if(error)return alert(error.message);rows=data||[];render()}
function filtered(){const q=$('search').value.trim().toLowerCase();return rows.filter(r=>!q||[r.name,r.phone,r.line_id].some(x=>String(x||'').toLowerCase().includes(q)))}
function render(){const data=filtered();$('empty').classList.toggle('hidden',data.length>0);$('leads').innerHTML=data.map(r=>`<article class="lead"><div><strong>${esc(r.name||'未填姓名')}</strong><div class="meta"><span>手機：${esc(r.phone)}</span><span>LINE：${esc(r.line_id)}</span><span>金額：${esc(r.q3_amount_needed)}</span><span>時間：${esc(new Date(r.created_at).toLocaleString('zh-TW'))}</span></div></div><div class="actions"><button onclick="status('${r.id}','contacted')">已联络</button><button onclick="status('${r.id}','line_added')">已加 LINE</button><button onclick="status('${r.id}','approved')">已成交</button></div></article>`).join('')}
async function status(id,value){const {error}=await db.rpc('update_page_lead_status',{target_slug:requestedPage,page_password:pagePassword,lead_id:id,new_status:value});if(error)alert(error.message);else loadLeads()}
function exportCsv(){const cols=['created_at','page_slug','name','phone','line_id','q3_amount_needed','status'];const csv=[cols.join(',')].concat(filtered().map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='leads.csv';a.click()}
</script></body></html>
