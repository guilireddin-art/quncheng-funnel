<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Page 客戶完整後台</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box}body{margin:0;background:#eef2f6;color:#162238;font-family:"Microsoft JhengHei",sans-serif}header{background:#111e32;color:#fff;padding:18px 26px;display:flex;justify-content:space-between;align-items:center}main{max-width:1320px;margin:auto;padding:24px}.card{background:#fff;border:1px solid #dbe3ec;border-radius:10px;margin-bottom:18px;box-shadow:0 2px 8px rgba(30,50,75,.05)}.login{max-width:430px;margin:50px auto;padding:22px}.hidden{display:none!important}label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid #d3dde8;border-radius:7px;padding:9px;font:inherit}button{border:1px solid transparent;border-radius:7px;background:#176bb4;color:#fff;padding:8px 12px;font-weight:800;cursor:pointer}.secondary{background:#fff;color:#52647b;border-color:#d5dfe9}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}.stat{background:#fff;border:1px solid #dbe3ec;border-radius:9px;padding:17px;border-left:5px solid #287bd0}.stat b{display:block;font-size:28px}.stat span{font-size:13px;color:#738297}.filters{padding:15px;display:flex;gap:10px;flex-wrap:wrap}.filters input{max-width:320px}.list-head{padding:16px 20px;border-bottom:1px solid #e2e8ef;display:flex;justify-content:space-between}.lead{padding:15px 20px;border-bottom:1px solid #e7edf3;display:grid;grid-template-columns:1fr auto;gap:12px}.lead:last-child{border:0}.lead h3{margin:0 0 8px}.meta{display:flex;gap:10px 18px;flex-wrap:wrap;color:#627286;font-size:13px}.actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.notice{font-size:13px;color:#6d7d90}.tag{padding:3px 7px;border-radius:5px;background:#e4f6eb;color:#087d46;font-size:11px}.drawer-bg{position:fixed;inset:0;background:rgba(15,30,50,.4);z-index:50}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(540px,100%);background:#fff;z-index:51;padding:22px;overflow:auto}.drawer-head{display:flex;justify-content:space-between;align-items:center}.detail{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item{border:1px solid #e0e7ee;border-radius:7px;padding:10px}.item small{display:block;color:#8391a2;margin-bottom:4px}.empty{text-align:center;padding:34px}@media(max-width:900px){.stats{grid-template-columns:repeat(3,1fr)}.lead{grid-template-columns:1fr}}@media(max-width:600px){main{padding:10px}.stats{grid-template-columns:repeat(2,1fr)}.detail{grid-template-columns:1fr}}
</style></head><body><header><strong id="header-title">Page 客戶完整後台</strong><button id="logout" class="secondary hidden" onclick="logout()">登出</button></header><main>
<section id="login" class="card login"><h2>Page 后台登录</h2><p id="page-label" class="notice"></p><label>密码</label><input id="password" type="password"><div style="height:12px"></div><button onclick="login()">登录</button><p id="msg" class="notice"></p></section>
<section id="app" class="hidden"><div class="stats"><div class="stat"><b id="s-total">0</b><span>全部客户</span></div><div class="stat"><b id="s-today">0</b><span>当日新增</span></div><div class="stat"><b id="s-new">0</b><span>新客户</span></div><div class="stat"><b id="s-contacted">0</b><span>已联络</span></div><div class="stat"><b id="s-line">0</b><span>已加 LINE</span></div><div class="stat"><b id="s-approved">0</b><span>已成交</span></div></div>
<section class="card filters"><input id="search" placeholder="搜尋姓名 / 手機 / LINE / 身分證" oninput="render()"><select id="status" onchange="render()"><option value="">全部状态</option><option value="new">新客户</option><option value="contacted">已联络</option><option value="line_added">已加 LINE</option><option value="approved">已成交</option><option value="invalid">无效</option></select><button onclick="loadLeads()">刷新订单</button><button class="secondary" onclick="exportCsv()">汇出 CSV</button></section>
<section class="card"><div class="list-head"><strong>申请列表</strong><span id="count" class="notice"></span></div><div id="leads"></div><p id="empty" class="notice empty">目前没有客户资料。</p></section></section></main>
<div id="drawer-bg" class="drawer-bg hidden" onclick="closeDetail()"></div><aside id="drawer" class="drawer hidden"><div class="drawer-head"><h2 id="detail-title">客户详情</h2><button class="secondary" onclick="closeDetail()">关闭</button></div><div id="detail" class="detail"></div></aside>
<script>
const URL_='https://ijzywhrnhvldkjdwfdyy.supabase.co',KEY='sb_publishable_6aY1-VEvimuV1K4FzURO2Q_inVt-ZKL',db=supabase.createClient(URL_,KEY);let rows=[],pagePassword='';const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const slug=new URLSearchParams(location.search).get('page')||'main';$('page-label').textContent=`登录 Page：${slug}`;$('header-title').textContent=`${slug}｜客户完整后台`;
async function login(){pagePassword=$('password').value;const {data,error}=await db.rpc('page_login',{target_slug:slug,page_password:pagePassword});$('msg').textContent=error||!data?'密码错误':'登录成功';if(data){$('login').classList.add('hidden');$('app').classList.remove('hidden');$('logout').classList.remove('hidden');loadLeads()}}
function logout(){pagePassword='';location.reload()}async function loadLeads(){const {data,error}=await db.rpc('get_page_leads',{target_slug:slug,page_password:pagePassword});if(error)return alert(error.message);rows=data||[];render()}
function isToday(v){const d=new Date(v),n=new Date();return d.toDateString()===n.toDateString()}function filtered(){const q=$('search').value.trim().toLowerCase(),st=$('status').value;return rows.filter(r=>(!st||r.status===st)&&(!q||[r.name,r.phone,r.line_id,r.id_number].some(v=>String(v||'').toLowerCase().includes(q))))}
function stats(){ $('s-total').textContent=rows.length;$('s-today').textContent=rows.filter(r=>isToday(r.created_at)).length;$('s-new').textContent=rows.filter(r=>r.status==='new').length;$('s-contacted').textContent=rows.filter(r=>r.status==='contacted').length;$('s-line').textContent=rows.filter(r=>r.status==='line_added').length;$('s-approved').textContent=rows.filter(r=>r.status==='approved').length}
function render(){stats();const data=filtered();$('empty').classList.toggle('hidden',data.length>0);$('count').textContent=`${data.length} 笔`;$('leads').innerHTML=data.map(r=>`<article class="lead"><div><h3>${esc(r.name||'未填姓名')} <span class="tag">${esc(r.status||'new')}</span></h3><div class="meta"><span>手機：<b>${esc(r.phone)}</b></span><span>LINE：<b>${esc(r.line_id)}</b></span><span>金額：<b>${esc(r.q3_amount_needed)}</b></span><span>居住：<b>${esc(r.city)}</b></span><span>${esc(new Date(r.created_at).toLocaleString('zh-TW'))}</span></div></div><div class="actions"><button onclick="setStatus('${r.id}','contacted')">已联络</button><button onclick="setStatus('${r.id}','line_added')">已加 LINE</button><button onclick="setStatus('${r.id}','approved')">已成交</button><button class="secondary" onclick="detail('${r.id}')">完整详情</button></div></article>`).join('')}
async function setStatus(id,new_status){const {error}=await db.rpc('update_page_lead_status',{target_slug:slug,page_password:pagePassword,lead_id:id,new_status});if(error)alert(error.message);else loadLeads()}
const labels={created_at:'提交时间',name:'姓名',age:'年龄',city:'居住地',id_number:'身分证字号',phone:'手机号码',line_id:'LINE ID',q1_existing_loan:'既有贷款／协商呆帐',q2_bank_status:'银行状态',q3_amount_needed:'需求金额',q4_foreign_currency_account:'外币帐户',status:'目前状态',line_clicked:'LINE 点击',source_url:'来源网址'};
function detail(id){const r=rows.find(x=>x.id===id);$('detail-title').textContent=`${r.name||'客户'}｜完整资料`;$('detail').innerHTML=Object.entries(labels).map(([k,l])=>`<div class="item"><small>${l}</small><div>${esc(k==='created_at'?new Date(r[k]).toLocaleString('zh-TW'):k==='line_clicked'?(r[k]?'已点击':'未点击'):r[k]||'未填')}</div></div>`).join('');$('drawer-bg').classList.remove('hidden');$('drawer').classList.remove('hidden')}function closeDetail(){$('drawer-bg').classList.add('hidden');$('drawer').classList.add('hidden')}
function exportCsv(){const data=filtered(),cols=['created_at','name','age','city','id_number','phone','line_id','q1_existing_loan','q2_bank_status','q3_amount_needed','q4_foreign_currency_account','status','source_url'];const csv=[cols.join(',')].concat(data.map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download=`${slug}-leads.csv`;a.click()}
</script></body></html>
